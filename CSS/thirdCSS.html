<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1:hover{
        color: red;
    }

    .box{
        width: 300px;
        height: 300px;
        background-color: green;

        /* transition-duration: 3s;
        transition-property: all;
        transition-timing-function: ease-in-out; */

        /* Shorthand */
        transition: all ease-in-out 3s;
    }

    .box:hover{
        background-color: red;
        border-radius: 50%;
    }

    .container{
        display: flex;
        /* justify-content , gap , flex-properties */
        /* gap: 40px; */

        /* justify-content : It justifies my object on my page */
        /* justify-content: center; */
        /* justify-content: space-between; */
        /* justify-content: space-around; */
        /* justify-content: space-evenly; */
        /* justify-content: flex-start; */
        /* justify-content: flex-end; */

        /* flex-wrap: nowrap; */
        /* flex-wrap: wrap; */

        flex-direction: column;
    }

    .sqBox{
        width: 300px;
        height: 300px;
    }

    #sq1{
        background-color: green;
    }
    #sq2{
        background-color: red;
    }
    #sq3{
        background-color: blue;
    }
</style>
<body>
    <!-- 
        Hover property
        Transition property
        Flex : this property always applies on the parent
        justify-content
        Flex-properties
    -->

    <h1>Hello</h1>

    <div class="box"></div>

    <hr>

    <div class="container">
        <div class="sqBox" id="sq1"></div>
        <div class="sqBox" id="sq2"></div>
        <div class="sqBox" id="sq3"></div>
    </div>

</body>
</html>
