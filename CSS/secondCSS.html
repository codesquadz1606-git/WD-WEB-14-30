<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second CSS</title>
</head>
<style>
    .box{
        width: 300px;
        height: 1300px;
        background-color: red;
        /* position: absolute; */
        /* position: relative; */
        /* position: fixed;
        left: 100px;
        top: 50px; */
    }

    .box1{
        width: 300px;
        height: 300px;
        background-color: yellow;
        /* position: fixed; */
        position: sticky;
        left: 100px;
        top: 50px;
    }

    .box2{
        width: 300px;
        height: 1300px;
        background-color: blue;
    }

    /* whenever we have to move any object : top , left , bottom , right */
</style>
<body>
    <!-- 
        What is positions?
        5 type of positions:
        1. Static(default) : In this we cannot move any object.
        2. Absolute : in this it leaves his space and move to parent
        3. Relative : In this it do not leaves his space and moves from his own space
        4. Fixed : in this it fix himself at one place and leaves his own space
        5. Sticky
    -->

    <div class="box"></div>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
