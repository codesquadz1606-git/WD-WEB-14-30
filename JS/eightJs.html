<body>
    
    <!-- <h1 class="bg">Hello Everyone</h1> -->
    <input type="text">
    <button onclick="dataHandle()">Print Name</button>

    <script>
        // getter(getAttribute) & setter(setAttribute)

        // getter means to get the attribute of a tag.
        // let h1=document.querySelector("h1")

        // h1.classList.toggle("bg")

        // Input handling & CLick Events
        let inp=document.querySelector("input")
        
        // Whenever their is change in input it is handled by "onchange" event

        function dataHandle(){
            let p=document.createElement("p")
            console.log(inp.value)
            p.innerText=`My name is ${inp.value}`
            document.querySelector("body").append(p)
        }
