    <!-- What is Conditional Statement?
        Rendering any output based on condition.
        
        if & else
        syntax:
        if(condition){ // if is the starting statment , if can be used multiple times
            code
        }
        else{ // else is the ending statement
            code
        }
        
        switch-case
        Syntax
        switch(variable){
            case 1: code
            case 2: code
            case 3: code
            ....
            ....
            ....
            default : code
        }
    -->

    <!-- 
        What is Control-FLow Statement?
        This is loop statement
        1. for loop
        Syntax:
        for(start;stop;step){
            code
        }

        2. while loop
        Syntax
        start;
        while(stop){
            code;
            step;
        }

        3. do-while loop
        Syntax:
        start;
        do{
            code
            step
        }while(stop)
    -->
