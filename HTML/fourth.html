<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        form tag : form tag is used to create an form where we have input feilds to fill up our details

        form tag
            label,input,textarea,select,......
    -->

    <form>
        <label for="fname">First Name : </label>
        <input type="text" id="fname">
        <br>
        <label for="lname">Last Name : </label>
        <input type="text" id="lname">
        <br>
        <label for="">Email : </label>
        <input type="email" placeholder="Enter your Email">
        <br>
        <label for="">Password : </label>
        <input type="password">
        <br>
        <label for="">Gender : </label>
        <input type="radio" name="gender">Male
        <input type="radio" name="gender">Female
        <br>
        <label for="">Select Course : </label>
        <select name="" id="">
            <option value="">--Select any one--</option>
            <option value="">MERN</option>
            <option value="">JAVA</option>
            <option value="">Python</option>
            <option value="">Dot Net</option>
        </select>
        <br>
        <label for="">Hobbies : </label>
        <input type="checkbox">Reading
        <input type="checkbox">Cycling
        <input type="checkbox">Singing

        <br>

        <label for="">Share Your Feedback : </label>
        <textarea rows="10" cols="50"></textarea>

        <br>

        <label for="">Date of Birth : </label>
        <input type="date">
        <input type="datetime-local">

        <br>

        <label for="">Upload Docs : </label>
        <input type="file">
        <br> 

        <input type="color">
        <br>
        <input type="submit" value="Upload">
        <input type="reset" value="Delete">
    </form>

    <hr>

    <form action="">
        <table>
            <tr>
                <td>
                    <label for="">First Name : </label>
                </td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Last Name : </label>
                </td>
                <td>
                    <input type="text">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Date of Birth : </label>
                </td>
                <td>
                    <input type="date">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Email : </label>
                </td>
                <td>
                    <input type="email">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Mobile No : </label>
                    
                </td>
                <td>
                    <input type="number">
                </td>
            </tr>
        </table>
        <input type="submit">
        <input type="reset">
    </form>
</body>
</html>
